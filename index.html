    <style>
        .check-item:checked + label .task-title {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .day-card {
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-card.completed {
            background-color: rgba(240, 253, 244, 0.9);
            border-color: #34d399;
        }
        .day-card.today {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .day-card.next-up {
            border-color: #10b981;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
            background: linear-gradient(to right, rgba(255,255,255,0.9), rgba(236, 253, 245, 0.9));
        }
        .day-card.alert-pending {
            border-color: #f59e0b;
            background-color: rgba(254, 252, 232, 0.9);
        }

        .dark body { background-color: #020617; } 
        .dark .day-card.completed {
            background-color: rgba(6, 78, 59, 0.4);
            border-color: #059669;
        }
        .dark .day-card.today { border-color: #60a5fa; }
        .dark .day-card.next-up {
            background: linear-gradient(to right, rgba(30, 41, 59, 0.9), rgba(6, 78, 59, 0.6));
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
        }
        .dark .day-card.alert-pending {
            background-color: rgba(69, 26, 3, 0.4);
            border-color: #d97706;
        }

        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; }
        .tip-reveal { animation: slideDown 0.4s ease-out forwards; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        // --- 3. FIREBASE AUTH & SYNC LOGIC ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth init failed:", error);
                document.getElementById('appLoader').innerHTML = `
                    <div class="text-center p-6 bg-white dark:bg-slate-800 rounded-2xl shadow-xl max-w-sm m-4">
                        <h3 class="text-red-500 font-bold mb-2 text-lg">Setup Needed</h3>
                        <p class="text-sm text-slate-500 mb-4 leading-relaxed">If you are hosting this on GitHub Pages, you need to add your own Firebase Project keys in the code to enable Cloud Save.</p>
                        <button onclick="document.getElementById('appLoader').classList.add('hidden')" class="bg-slate-800 text-white px-5 py-3 rounded-xl text-sm font-bold w-full">I Understand</button>
                    </div>`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                subscribeToData();
                updateAuthUI();
            } else {
                currentUser = null;
                updateAuthUI();
            }
        });

        function subscribeToData() {
            if (unsubDoc) unsubDoc();
            if (!currentUser) return;
            
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'appData', 'main');
            unsubDoc = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.config) appConfig = { ...appConfig, ...data.config };
                    if (data.progress) appProgress = data.progress;
                }
                
                document.getElementById('appLoader').classList.add('hidden');
                refreshAllUI();
            }, (error) => {
                console.error("Firestore read error:", error);
                document.getElementById('appLoader').classList.add('hidden');
            });
        }

        async function saveToCloud() {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'appData', 'main');
                await setDoc(docRef, { config: appConfig, progress: appProgress }, { merge: true });
            } catch (e) {
                console.error("Cloud Save Error:", e);
                window.showToast("Failed to sync to cloud", "вЭМ");
            }
        }

        }

            const pw = document.getElementById('authPassword').value;
            if(!em || !pw) return window.showToast("Enter email and password", "вЪ†пЄП");

                await createUserWithEmailAndPassword(auth, em, pw);
                window.showToast("Account Created!", "вЬЕ");
            } catch(e) { window.showToast(e.message, "вЭМ"); }
        }

            await signOut(auth);
            appProgress = {}; // clear local on logout

            window.showToast("Logged out successfully", "вДєпЄП");

        function updateAuthUI() {
            if (currentUser && !currentUser.isAnonymous) {
                document.getElementById('loggedOutUI').classList.add('hidden');
                document.getElementById('loggedInUI').classList.remove('hidden');
                document.getElementById('userEmailDisplay').innerText = currentUser.email;
            } else {
                document.getElementById('loggedOutUI').classList.remove('hidden');
                document.getElementById('loggedInUI').classList.add('hidden');
            }
        }

        function refreshAllUI() {
            document.getElementById('startDateInput').value = appConfig.startDate;
            document.getElementById('reminderTimeInput').value = appConfig.reminderTime;
            document.getElementById('profileNameDisplay').innerText = appConfig.userName;
            document.getElementById('profileImgDisplay').src = appConfig.profilePic;
            
            applyTheme(appConfig.theme);
            applyLanguage(appConfig.language);
            
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('currentDateDisplay').innerText = `Today: ${new Date().toLocaleDateString(appConfig.language === 'si' ? 'si-LK' : 'en-US', options)}`;
            
            window.renderList();
            window.updateProgress();
        }

        window.openSettingsModal = function() {

            updateSettingsUIButtons();
            document.getElementById('settingsModal').classList.replace('hidden', 'flex');

            document.getElementById('btnLight').className = `p-2 rounded-xl transition-all ${appConfig.theme === 'light' ? 'bg-white shadow-md border border-slate-200' : 'opacity-50 grayscale'}`;

            document.getElementById('btnEn').className = `px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${appConfig.language === 'en' ? 'bg-blue-500 text-white shadow-md' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'}`;
            document.getElementById('btnSi').className = `px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${appConfig.language === 'si' ? 'bg-blue-500 text-white shadow-md' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'}`;
        }

        window.setTheme = function(mode) {

        function applyTheme(mode) {
            if (mode === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }

        window.setLang = function(lang) {
            appConfig.language = lang;
            updateSettingsUIButtons();
        }

        function applyLanguage(lang) {
            const dict = i18n[lang];
            
            // Translate explicit text elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerText = dict[key];
            });

            // Translate input placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (dict[key]) el.setAttribute('placeholder', dict[key]);
            });

            // Set browser tab title
            document.title = dict.appTitle;

            window.renderList();
        }

        window.handleImageUpload = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 200; 
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    appConfig.profilePic = compressedDataUrl;
                    document.getElementById('modalProfileImg').src = compressedDataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveProfileSettings = async function() {
            appConfig.userName = document.getElementById('nameInput').value || "Farmer";
            await saveToCloud();
            
            document.getElementById('profileNameDisplay').innerText = appConfig.userName;
            document.getElementById('profileImgDisplay').src = appConfig.profilePic;
            applyLanguage(appConfig.language);
            
            window.closeSettingsModal();
            window.showToast(appConfig.language === 'en' ? "Settings Saved to Cloud!" : "аЈГаЈРаґЪаЈГаЈФаґЄаЈК аЈАаґљаЈПаґЪаЈФаЈЕаЈЩаЈДаЈТ аЈГаЈФаґїаЈРаґЪаЈТаґЂаЈТ!", "вЬЕ");
        }

        window.updateSettings = async function() {
            appConfig.startDate = document.getElementById('startDateInput').value;
            appConfig.reminderTime = document.getElementById('reminderTimeInput').value;
            await saveToCloud();
            window.renderList();
        }

        function getDayDate(dayNum) {
            const date = new Date(appConfig.startDate);
            date.setDate(date.getDate() + (dayNum - 1));
            return date;
        }

        window.showToast = function(message, icon = "вЪ†пЄП") {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            document.getElementById('toastIcon').innerText = icon;
            toast.classList.remove('toast-enter');
            toast.classList.add('toast-active');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('toast-active');
                toast.classList.add('toast-enter');
            }, 4000);
        }

        window.renderList = function() {
            const listContainer = document.getElementById('taskList');
            listContainer.innerHTML = '';
            
            const todayStr = new Date().toISOString().split('T')[0];
            const currentHourMin = new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0');
            const lang = appConfig.language;
            const t = i18n[lang];

            const nextUpDay = scheduleData.find(item => !appProgress[item.day])?.day;

            scheduleData.forEach(item => {
                const data = item[lang]; 
                const isCompleted = appProgress[item.day] || false;
                const itemDate = getDayDate(item.day);
                const itemDateStr = itemDate.toISOString().split('T')[0];
                const isToday = itemDateStr === todayStr;
                const isOverdue = isToday && !isCompleted && currentHourMin > appConfig.reminderTime && item.type !== 'rest';
                const dateLabel = itemDate.toLocaleDateString(lang === 'si' ? 'si-LK' : 'en-US', { month: 'short', day: 'numeric', weekday: 'short' });
                const isRest = item.type === 'rest';
                
                const isNextUp = item.day === nextUpDay && itemDateStr <= todayStr;

                let cardClasses = `day-card p-5 bg-white/50 dark:bg-slate-800/50 rounded-3xl border-2 hover:shadow-md flex flex-col justify-between `;
                if (isCompleted) cardClasses += `completed border-emerald-500 `;
                else if (isNextUp) cardClasses += `next-up border-emerald-500 `;
                else if (isToday) cardClasses += `today border-blue-500 `;
                else if (isOverdue) cardClasses += `alert-pending border-amber-500 `;
                else cardClasses += `border-slate-100 dark:border-slate-700 `;
                
                const card = document.createElement('div');
                card.className = cardClasses;
                
                card.innerHTML = `
                    <div class="flex items-start gap-4 h-full">
                        <div class="flex-shrink-0 mt-1">
                            <input type="checkbox" id="day-${item.day}" 
                                class="check-item w-7 h-7 rounded-xl border-2 border-slate-300 checked:border-emerald-500 text-emerald-500 focus:ring-emerald-500 transition-all cursor-pointer bg-white dark:bg-slate-900"
                                ${isCompleted ? 'checked' : ''} 
                                onchange="window.toggleDay(${item.day})">
                        </div>
                        <div class="flex-grow flex flex-col h-full justify-center">
                            <label for="day-${item.day}" class="cursor-pointer block flex-grow">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="text-[10px] font-black uppercase tracking-widest ${isToday ? 'text-blue-500' : 'text-slate-400'}">
                                        ${t.dayPrefix} ${item.day} вАҐ ${dateLabel} ${isNextUp ? t.nextBadge : ''}
                                    </span>
                                    ${isRest ? `<span class="text-[9px] font-black bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded-full text-slate-500 dark:text-slate-400">${t.restBadge}</span>` : ''}
                                </div>
                                <h3 class="task-title font-bold text-lg leading-tight text-slate-800 dark:text-slate-100 ${isRest ? 'opacity-40' : ''}">${data.item}</h3>
                                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium mt-1">${isRest ? t.restDoseText : `${t.dosePrefix} <span class="text-slate-700 dark:text-slate-300 font-bold">${data.dosage}</span>`}</p>
                            </label>

                            ${isCompleted ? `
                                <div class="mt-4 bg-emerald-50 dark:bg-emerald-900/10 p-3.5 rounded-xl border border-emerald-100 dark:border-emerald-800/30 tip-reveal">
                                    <p class="text-xs leading-relaxed text-emerald-800 dark:text-emerald-300">
                                        <span class="font-black tracking-widest uppercase text-[10px] text-emerald-600 dark:text-emerald-500 mb-1 block">${t.expertTrick}</span> 
                                        ${data.tip}
                                    </p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        window.toggleDay = async function(day) {
            const checkbox = document.getElementById(`day-${day}`);
            const itemDateStr = getDayDate(day).toISOString().split('T')[0];
            const todayStr = new Date().toISOString().split('T')[0];

            if (checkbox.checked && itemDateStr > todayStr) {
                checkbox.checked = false; 
                const lang = appConfig.language;
                const targetDate = getDayDate(day).toLocaleDateString(lang === 'si' ? 'si-LK' : 'en-US', { month: 'short', day: 'numeric' });
                window.showToast(`${i18n[lang].errFutureDate} ${targetDate}.`);
                return;
            }

            appProgress[day] = checkbox.checked;
            window.renderList();
            window.updateProgress();
            await saveToCloud();
        }

        window.updateProgress = function() {
            const completedCount = Object.values(appProgress).filter(val => val === true).length;
            const percentage = Math.round((completedCount / scheduleData.length) * 100);
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').innerHTML = `${percentage}% <span data-i18n="progressWord">${i18n[appConfig.language].progressWord}</span>`;
        }

        window.downloadICS = function() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//NaiMirisTracker//EN\n";
            const [hours, minutes] = appConfig.reminderTime.split(':');
            scheduleData.forEach(item => {
                if (item.type === 'rest') return;
                const data = item[appConfig.language];
                const date = getDayDate(item.day);
                date.setHours(parseInt(hours), parseInt(minutes), 0);
                
                const formatTime = (d) => `${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,'0')}${String(d.getUTCDate()).padStart(2,'0')}T${String(d.getUTCHours()).padStart(2,'0')}${String(d.getUTCMinutes()).padStart(2,'0')}00Z`;
                const timestamp = formatTime(date);
                
                icsContent += `BEGIN:VEVENT\nDTSTART:${timestamp}\nDTEND:${timestamp}\nSUMMARY:рЯМґпЄП Farm: ${data.item}\nDESCRIPTION:Dosage: ${data.dosage}\\nTip: ${data.tip}\nBEGIN:VALARM\nTRIGGER:-PT15M\nACTION:DISPLAY\nEND:VALARM\nEND:VEVENT\n`;
            });
            icsContent += "END:VCALENDAR";
            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'nai_miris_reminders.ics';
            link.click();
        }

        window.resetSchedule = async function() {
            if (confirm(appConfig.language === 'en' ? "Are you sure you want to reset all progress?" : "аЈГаЈТаґЇаґљаЈФаґЄ аґѓаґ≠аЈКаґ≠ аґЄаґЪаЈП аґѓаЈРаґЄаЈУаґЄаґІ аґЕаЈАаЈБаЈКвАНаґЇ аґґаЈА аЈАаЈТаЈБаЈКаЈАаЈПаЈГаґѓ?")) {
                appProgress = {};
                await saveToCloud();
                window.renderList();
                window.updateProgress();
            }
        }

        // Boot
        initAuth();
    </script>
</body>
</html>
